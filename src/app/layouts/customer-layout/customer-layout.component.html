<mat-sidenav-container class="layout-container" [class.dark-mode]="isDarkMode">
  <!-- Toolbar -->
  <mat-toolbar class="app-toolbar" color="primary">
    <button mat-icon-button (click)="toggleDrawer()">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-icon class="portal-icon">person</mat-icon>
    <span class="portal-title">CUSTOMER PORTAL</span>
    <span class="spacer"></span>
    <button mat-icon-button (click)="toggleDarkMode()">
      <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <button mat-icon-button [matMenuTriggerFor]="accountMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #accountMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <!-- Sidenav -->
  <mat-sidenav #sidenav mode="side" [opened]="sidenavOpened" class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/customer/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/customer/send" routerLinkActive="active-link">
        <mat-icon matListItemIcon>send</mat-icon>
        <span matListItemTitle>Send Money</span>
      </a>
      <a mat-list-item routerLink="/customer/transactions" routerLinkActive="active-link">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>My Transactions</span>
      </a>

      <mat-divider class="nav-divider"></mat-divider>

      <a mat-list-item routerLink="/">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="main-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
